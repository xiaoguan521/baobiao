<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oracle 报表服务台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="panel">
        <div class="panel-header">
          <h2>访问配置</h2>
          <p>如果服务启用了 `REPORT_API_TOKEN`，在这里填写后即可复用到页面内所有请求。</p>
        </div>
        <form id="authForm" class="grid-form">
          <label>
            <span>API Token</span>
            <input id="apiToken" type="password" placeholder="可留空" autocomplete="off" />
          </label>
          <label class="full-width">
            <span>Token 状态</span>
            <div id="tokenHint" class="hint-box">未保存到服务器，仅保存在当前浏览器。</div>
          </label>
        </form>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>生成报表</h2>
          <p>默认生成整本 Excel。若只导出单个 sheet，请勾选“仅导出该 sheet”。</p>
        </div>
        <form id="generateForm" class="grid-form">
          <label>
            <span>月份</span>
            <input id="month" name="month" type="month" required />
          </label>
          <label>
            <span>Sheet</span>
            <select id="sheetName" name="sheetName">
              <option value="">整本报表</option>
            </select>
          </label>
          <label class="checkbox">
            <input id="sheetOnly" name="sheetOnly" type="checkbox" />
            <span>仅导出该 sheet</span>
          </label>
          <div class="actions full-width">
            <button type="submit">生成报表</button>
            <button type="button" id="resetResult" class="ghost">清空结果</button>
          </div>
        </form>

        <div id="generateResult" class="result-card empty">
          <p>生成结果会显示在这里。</p>
        </div>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
  </html>

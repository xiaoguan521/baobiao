services:
  baobiao:
    image: ghcr.io/xiaoguan521/baobiao:baobiao-202604170910
    container_name: baobiao
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      ORACLE_USER: damoxing
      ORACLE_PASSWORD: your-password
      ORACLE_DSN: host.docker.internal:51521/FREEPDB1
      REPORT_API_TOKEN: replace-with-a-strong-token
      REPORT_PUBLIC_BASE_URL: https://report.example.com
      REPORT_RULES_PATH: /app/config/report-rules.json
    volumes:
      - ./data:/app/generated
      - ../config/report-rules.json:/app/config/report-rules.json:ro
